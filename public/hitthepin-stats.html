<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitThePin Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242836;
  --border: #2d3348;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; font-size:14px; }
.header { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:20px; font-weight:600; }
.header h1 span { color:var(--green); }
.header .meta { color:var(--text2); font-size:13px; }
.container { max-width:1400px; margin:0 auto; padding:20px; }

/* KPI Cards */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; }
.kpi-card .label { color:var(--text2); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.kpi-card .value { font-size:28px; font-weight:700; }
.kpi-card .sub { color:var(--text2); font-size:12px; margin-top:4px; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--bg2); padding:4px; border-radius:10px; border:1px solid var(--border); }
.tab-btn { flex:1; padding:10px 16px; background:transparent; border:none; color:var(--text2); font-size:14px; font-weight:500; cursor:pointer; border-radius:8px; transition:all .2s; }
.tab-btn:hover { color:var(--text); background:var(--bg3); }
.tab-btn.active { background:var(--accent); color:white; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Chart containers */
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.chart-grid.full { grid-template-columns:1fr; }
.chart-box { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; }
.chart-box h3 { font-size:15px; font-weight:600; margin-bottom:16px; color:var(--text); }
.chart-box canvas { max-height:350px; }

/* Tables */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; padding:10px 12px; font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; }
.data-table th:hover { color:var(--accent2); }
.data-table th.sort-asc::after { content:" \25B2"; font-size:10px; }
.data-table th.sort-desc::after { content:" \25BC"; font-size:10px; }
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
.data-table tr:hover td { background:var(--bg3); }
.data-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
.data-table th.num { text-align:right; }

.loading { display:flex; align-items:center; justify-content:center; height:60vh; }
.loading::after { content:"Loading..."; color:var(--text2); font-size:16px; }

@media (max-width:900px) {
  .chart-grid { grid-template-columns:1fr; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>HitThePin</span> Analytics</h1>
  <div class="meta" id="headerMeta"></div>
</div>

<div class="container">
  <div class="loading" id="loadingState"></div>

  <div id="mainContent" style="display:none;">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('traffic')">Traffic</button>
      <button class="tab-btn" onclick="switchTab('queries')">Search Queries</button>
      <button class="tab-btn" onclick="switchTab('pages')">Top Pages</button>
    </div>

    <div class="tab-content active" id="tab-traffic">
      <div class="chart-grid full">
        <div class="chart-box"><h3>Daily Performance (28 days)</h3><canvas id="chartDaily"></canvas></div>
      </div>
      <div class="chart-grid">
        <div class="chart-box"><h3>Device Breakdown</h3><canvas id="chartDevices"></canvas></div>
        <div class="chart-box"><h3>Top Countries</h3><canvas id="chartCountries"></canvas></div>
      </div>
    </div>

    <div class="tab-content" id="tab-queries">
      <div class="chart-box">
        <h3>Top Search Queries (28 days)</h3>
        <table class="data-table" id="queriesTable">
          <thead><tr>
            <th data-key="query">Query</th>
            <th class="num" data-key="clicks">Clicks</th>
            <th class="num" data-key="impressions">Impressions</th>
            <th class="num" data-key="ctr">CTR</th>
            <th class="num" data-key="position">Avg Position</th>
          </tr></thead>
          <tbody id="queriesTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="tab-content" id="tab-pages">
      <div class="chart-box">
        <h3>Top Pages (28 days)</h3>
        <table class="data-table" id="pagesTable">
          <thead><tr>
            <th data-key="page">Page</th>
            <th class="num" data-key="clicks">Clicks</th>
            <th class="num" data-key="impressions">Impressions</th>
            <th class="num" data-key="ctr">CTR</th>
            <th class="num" data-key="position">Avg Position</th>
          </tr></thead>
          <tbody id="pagesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = null;

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const tabs = ['traffic', 'queries', 'pages'];
  const idx = tabs.indexOf(name);
  if (idx >= 0) btns[idx].classList.add('active');
}

function fmt(n) { return n != null ? n.toLocaleString() : '—'; }

// ── KPI Cards ──
function renderKPI(data) {
  const t = data.totals;
  const cards = [
    { label: 'Total Clicks (28d)', value: fmt(t.clicks), color: 'var(--blue)' },
    { label: 'Total Impressions (28d)', value: fmt(t.impressions), color: 'var(--purple)' },
    { label: 'Avg CTR', value: (t.ctr * 100).toFixed(2) + '%', color: 'var(--green)' },
    { label: 'Avg Position', value: t.position.toFixed(1), color: 'var(--orange)' },
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c =>
    `<div class="kpi-card"><div class="label">${c.label}</div><div class="value" style="color:${c.color}">${c.value}</div></div>`
  ).join('');
}

// ── Daily Performance Chart ──
function renderDailyChart(data) {
  const daily = data.daily || [];
  if (!daily.length) return;

  const labels = daily.map(d => d.date.slice(5)); // MM-DD
  new Chart(document.getElementById('chartDaily'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Clicks',
          data: daily.map(d => d.clicks),
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.1)',
          fill: true,
          tension: 0.3,
          yAxisID: 'y',
        },
        {
          label: 'Impressions',
          data: daily.map(d => d.impressions),
          borderColor: '#a855f7',
          backgroundColor: 'rgba(168,85,247,0.1)',
          fill: true,
          tension: 0.3,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#94a3b8', padding: 16 } } },
      scales: {
        x: { ticks: { color: '#94a3b8', maxRotation: 45 }, grid: { color: 'rgba(45,51,72,0.5)' } },
        y: {
          type: 'linear', position: 'left', beginAtZero: true,
          title: { display: true, text: 'Clicks', color: '#3b82f6' },
          ticks: { color: '#94a3b8' }, grid: { color: 'rgba(45,51,72,0.5)' },
        },
        y1: {
          type: 'linear', position: 'right', beginAtZero: true,
          title: { display: true, text: 'Impressions', color: '#a855f7' },
          ticks: { color: '#94a3b8' }, grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

// ── Device Breakdown Doughnut ──
function renderDeviceChart(data) {
  const devices = data.devices || [];
  if (!devices.length) return;

  const colorMap = { DESKTOP: '#3b82f6', MOBILE: '#22c55e', TABLET: '#f59e0b' };
  new Chart(document.getElementById('chartDevices'), {
    type: 'doughnut',
    data: {
      labels: devices.map(d => d.device),
      datasets: [{
        data: devices.map(d => d.clicks),
        backgroundColor: devices.map(d => colorMap[d.device] || '#6366f1'),
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 16 } } },
    },
  });
}

// ── Top Countries Horizontal Bar ──
function renderCountryChart(data) {
  const countries = data.countries || [];
  if (!countries.length) return;

  const colors = ['#6366f1','#3b82f6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#a855f7','#818cf8','#94a3b8'];
  new Chart(document.getElementById('chartCountries'), {
    type: 'bar',
    data: {
      labels: countries.map(c => c.country),
      datasets: [{
        label: 'Clicks',
        data: countries.map(c => c.clicks),
        backgroundColor: countries.map((_, i) => colors[i % colors.length] + '99'),
        borderColor: countries.map((_, i) => colors[i % colors.length]),
        borderWidth: 1,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(45,51,72,0.5)' } },
        y: { ticks: { color: '#94a3b8' }, grid: { display: false } },
      },
    },
  });
}

// ── Sortable Tables ──
function setupSortableTable(tableId, rows, renderFn) {
  const table = document.getElementById(tableId);
  const headers = table.querySelectorAll('th');
  let sortKey = null;
  let sortDir = 'desc';

  headers.forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = 'desc';
      }
      headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');

      const sorted = [...rows].sort((a, b) => {
        const va = a[key], vb = b[key];
        if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortDir === 'asc' ? va - vb : vb - va;
      });
      renderFn(sorted);
    });
  });
}

function renderQueriesTable(rows) {
  document.getElementById('queriesTableBody').innerHTML = rows.map(r =>
    `<tr>
      <td>${escHtml(r.query)}</td>
      <td class="num">${fmt(r.clicks)}</td>
      <td class="num">${fmt(r.impressions)}</td>
      <td class="num">${(r.ctr * 100).toFixed(2)}%</td>
      <td class="num">${r.position.toFixed(1)}</td>
    </tr>`
  ).join('');
}

function renderPagesTable(rows) {
  document.getElementById('pagesTableBody').innerHTML = rows.map(r => {
    let path;
    try { path = new URL(r.page).pathname; } catch { path = r.page; }
    return `<tr>
      <td title="${escHtml(r.page)}">${escHtml(path)}</td>
      <td class="num">${fmt(r.clicks)}</td>
      <td class="num">${fmt(r.impressions)}</td>
      <td class="num">${(r.ctr * 100).toFixed(2)}%</td>
      <td class="num">${r.position.toFixed(1)}</td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Load ──
async function load() {
  try {
    const res = await fetch('/api/hitthepin-analytics', { credentials: 'same-origin' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('headerMeta').textContent = 'Updated ' + new Date().toLocaleString();

    renderKPI(DATA);
    renderDailyChart(DATA);
    renderDeviceChart(DATA);
    renderCountryChart(DATA);

    // Queries table
    const queries = DATA.topQueries || [];
    renderQueriesTable(queries);
    setupSortableTable('queriesTable', queries, renderQueriesTable);

    // Pages table
    const pages = DATA.topPages || [];
    renderPagesTable(pages);
    setupSortableTable('pagesTable', pages, renderPagesTable);
  } catch (err) {
    document.getElementById('loadingState').innerHTML =
      '<div style="color:var(--red);text-align:center;">Failed to load data: ' + err.message + '</div>';
  }
}

load();
</script>
</body>
</html>
